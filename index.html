<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub 热点 · 每日更新</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: oklch(10% 0.01 260);
      --surface: oklch(13% 0.012 260);
      --surface-2: oklch(16% 0.014 260);
      --border: oklch(22% 0.018 260);
      --border-subtle: oklch(18% 0.015 260);
      --text: oklch(93% 0.008 260);
      --text-muted: oklch(62% 0.015 260);
      --text-dim: oklch(45% 0.012 260);
      --accent: oklch(72% 0.18 145);
      --accent-glow: oklch(72% 0.18 145 / 0.15);
      --gold: oklch(78% 0.16 85);
      --blue: oklch(68% 0.2 240);
      --purple: oklch(65% 0.2 290);
      --radius: 10px;
      --radius-sm: 6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(oklch(100% 0 0 / 0.02) 1px, transparent 1px),
        linear-gradient(90deg, oklch(100% 0 0 / 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: oklch(10% 0.01 260 / 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }

    .logo-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background: var(--accent-glow);
      border: 1px solid oklch(72% 0.18 145 / 0.3);
      display: grid;
      place-items: center;
    }

    .logo-icon svg { width: 18px; height: 18px; fill: var(--accent); }

    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
    .logo-text span { color: var(--accent); }
    .header-meta { display: flex; align-items: center; gap: 16px; }

    .update-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .search-wrap { position: relative; display: flex; align-items: center; gap: 6px; }

    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; fill: none; stroke: var(--text-dim); stroke-width: 2;
    }

    #search {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      width: 200px;
      outline: none;
      transition: border-color 0.2s, width 0.3s;
    }

    #search:focus { border-color: oklch(72% 0.18 145 / 0.5); width: 260px; }
    #search::placeholder { color: var(--text-dim); }

    .search-mode-toggle { display: flex; gap: 2px; }

    .search-mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .search-mode-btn:hover { color: var(--text); background: var(--surface-2); }

    .search-mode-btn.active {
      background: var(--accent-glow);
      border-color: oklch(72% 0.18 145 / 0.4);
      color: var(--accent);
    }

    /* GitHub Search Results Modal */
    .github-search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: oklch(0 0 0 / 0.7);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .github-search-overlay.active { display: flex; align-items: flex-start; justify-content: center; padding-top: 80px; }

    .github-search-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90%;
      max-width: 800px;
      max-height: 70vh;
      overflow: hidden;
      box-shadow: 0 20px 60px oklch(0 0 0 / 0.5);
    }

    .github-search-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .github-search-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .github-search-title svg { width: 20px; height: 20px; fill: var(--text); }

    .github-search-close {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }

    .github-search-close:hover { color: var(--text); background: var(--surface-2); }

    .github-search-body { max-height: calc(70vh - 60px); overflow-y: auto; }

    .github-search-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
      color: var(--text-muted);
    }

    .github-search-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .github-search-result {
      display: flex;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s;
    }

    .github-search-result:hover { background: var(--surface-2); }

    .github-search-result:last-child { border-bottom: none; }

    .github-result-avatar {
      width: 40px; height: 40px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }

    .github-result-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .github-result-content { flex: 1; min-width: 0; }

    .github-result-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: block;
      margin-bottom: 4px;
    }

    .github-result-name:hover { text-decoration: underline; }

    .github-result-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .github-result-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .github-result-lang {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .github-result-lang-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .github-search-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .github-search-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    /* ── Main ── */
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── Tab Navigation ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
      width: fit-content;
    }

    .tab-btn {
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      padding: 8px 18px;
      font-size: 13px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface-2); }

    .tab-btn.active {
      background: var(--surface-2);
      color: var(--text);
      box-shadow: 0 1px 3px oklch(0 0 0 / 0.3);
    }

    .tab-btn .tab-icon { font-size: 14px; }

    /* ── Hero Stats ── */
    .hero { margin-bottom: 32px; }

    .hero-title {
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .hero-title em { font-style: normal; color: var(--accent); }
    .hero-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

    .stats-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px 5px 9px;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .stat-pill .num { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Filter Section ── */
    .filter-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 24px;
    }

    .filter-mode-switch {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 3px;
      width: fit-content;
    }

    .mode-btn {
      border: none;
      background: transparent;
      border-radius: 4px;
      padding: 5px 13px;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { background: var(--surface-2); color: var(--text); }

    .filter-divider { height: 1px; background: var(--border-subtle); margin-bottom: 12px; }

    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .filter-btn {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { background: var(--surface-2); color: var(--text); }

    .filter-btn.active {
      background: var(--accent-glow);
      border-color: oklch(72% 0.18 145 / 0.4);
      color: var(--accent);
      font-weight: 500;
    }

    .filter-btn.lang-filter.active {
      background: oklch(68% 0.2 240 / 0.12);
      border-color: oklch(68% 0.2 240 / 0.3);
      color: var(--blue);
    }

    .lang-dot-sm {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: -1px;
    }

    .active-filters {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .active-filters:empty { display: none; }
    .active-filters-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: oklch(72% 0.18 145 / 0.1);
      border: 1px solid oklch(72% 0.18 145 / 0.2);
      border-radius: 100px;
      padding: 2px 9px;
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
    }

    .filter-chip.lang {
      background: oklch(68% 0.2 240 / 0.1);
      border-color: oklch(68% 0.2 240 / 0.2);
      color: var(--blue);
    }

    .filter-chip-remove { cursor: pointer; opacity: 0.6; font-size: 13px; transition: opacity 0.15s; }
    .filter-chip-remove:hover { opacity: 1; }

    /* ── Tab Content ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .section-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
    .section-title .icon { width: 26px; height: 26px; border-radius: var(--radius-sm); display: grid; place-items: center; font-size: 13px; }

    .section-count {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 2px 8px;
    }

    .trending-section { margin-bottom: 40px; }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 10px;
    }

    /* ── Top Card ── */
    .top-project {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--surface) 0%, oklch(14% 0.02 200) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      margin-bottom: 4px;
    }

    .top-project::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .top-project:hover { border-color: oklch(72% 0.18 145 / 0.4); transform: translateY(-2px); }

    .top-rank {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 80px;
      font-weight: 700;
      color: oklch(72% 0.18 145 / 0.06);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      letter-spacing: -0.05em;
      user-select: none;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-glow);
      border: 1px solid oklch(72% 0.18 145 / 0.3);
      border-radius: 100px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .top-project-name { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
    .top-project-name a { color: inherit; text-decoration: none; }
    .top-project-name a:hover { color: var(--accent); }
    .top-project-owner { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .top-project-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; max-width: 580px; margin-bottom: 14px; }
    .top-project-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      background: linear-gradient(135deg, oklch(72% 0.18 145 / 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .card:hover { border-color: oklch(40% 0.03 260); transform: translateY(-2px); background: var(--surface-2); }
    .card:hover::after { opacity: 1; }

    .card-rank {
      position: absolute;
      top: 13px; right: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .card-header { display: flex; align-items: flex-start; gap: 9px; }

    .card-avatar {
      width: 34px; height: 34px;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
      color: var(--text-muted);
    }

    .card-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .card-title-group { flex: 1; min-width: 0; }
    .card-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-owner { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

    .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
    .card-stats { display: flex; align-items: center; gap: 10px; }

    .stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .stat svg { width: 11px; height: 11px; flex-shrink: 0; }
    .stat.star svg { fill: var(--gold); }
    .stat.fork svg { fill: none; stroke: var(--text-dim); stroke-width: 2; }
    .stat.up svg { fill: var(--accent); }

    .today-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      background: oklch(72% 0.18 145 / 0.1);
      border: 1px solid oklch(72% 0.18 145 / 0.2);
      border-radius: 100px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .today-badge::before { content: '↑'; font-size: 10px; }

    .week-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      background: oklch(78% 0.16 85 / 0.12);
      border: 1px solid oklch(78% 0.16 85 / 0.2);
      border-radius: 100px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .week-badge::before { content: '★'; font-size: 9px; }

    .lang-tag { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
    .lang-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .domain-tag {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      padding: 2px 7px;
      align-self: flex-start;
    }

    .topics { display: flex; gap: 4px; flex-wrap: wrap; }
    .topic { font-size: 10px; border: 1px solid var(--border); border-radius: 100px; padding: 1px 6px; color: var(--text-dim); background: var(--surface-2); white-space: nowrap; }

    /* ── Rank medal ── */
    .rank-medal {
      position: absolute;
      top: 10px; right: 10px;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .rank-1 { background: linear-gradient(135deg, #ffd700, #ffb300); color: #000; }
    .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
    .rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
    .rank-default { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

    /* ── Empty ── */
    .empty { grid-column: 1 / -1; text-align: center; padding: 50px 20px; color: var(--text-dim); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; }

    /* ── Footer ── */

// ─── State ───
let filterMode = 'lang';
let selectedLang = null;
let selectedDomain = null;
let searchQuery = '';
let currentTab = 'today';

// 本周热门筛选状态
let filterModeWeekly = 'lang';
let selectedLangWeekly = null;
let selectedDomainWeekly = null;

// 总排行榜筛选状态
let filterModeAlltime = 'lang';
let selectedLangAlltime = null;
let selectedDomainAlltime = null;

function formatNum(n) {
  if (!n && n !== 0) return '-';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function formatDate() {
  return new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric' }) +
    ' ' + new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }) + ' 更新';
}

// ─── Tab Switch ───
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(
      tab === 'today' ? '今日' : tab === 'weekly' ? '本周' : '总排行'
    ));
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  const heroTitle = document.getElementById('heroTitle');
  const heroSub = document.getElementById('heroSub');
  const statsRow = document.getElementById('statsRow');

  if (tab === 'today') {
    heroTitle.innerHTML = '今日 <em>GitHub</em> 热点';
    heroSub.textContent = '实时追踪全球开发者最关注的开源项目 · 双维度分类筛选';
    renderTodayStats();
  } else if (tab === 'weekly') {
    heroTitle.innerHTML = '本周 <em>GitHub</em> 热门';
    heroSub.textContent = '本周增长最快的开源项目排行榜 · 按周新增 Star 排序';
    renderWeeklyStats();
  } else {
    heroTitle.innerHTML = 'GitHub <em>总排行榜</em>';
    heroSub.textContent = 'GitHub 全网 Star 最多的开源项目 · 历史累计排名';
    renderAlltimeStats();
  }
}

// ─── Filter ───
function getFilteredTodayData() {
  return TODAY_DATA.filter(p => {
    const langMatch = !selectedLang || p.lang === selectedLang;
    // 动态计算 domain（因为数据中没有预存 domain 属性）
    const projectDomain = p.domain || assignDomain(p);
    const domainMatch = !selectedDomain || projectDomain === selectedDomain;
    const q = searchQuery.toLowerCase();
    const searchMatch = !q || p.name.toLowerCase().includes(q) || p.owner.toLowerCase().includes(q) || (p.desc||'').toLowerCase().includes(q);
    return langMatch && domainMatch && searchMatch;
  });
}

function renderFilters() {
  const row = document.getElementById('filterRow');
  let html = `<button class="filter-btn ${!selectedLang && !selectedDomain ? 'active' : ''}" onclick="clearFilters()">全部</button>`;

  if (filterMode === 'lang') {
    [...new Set(TODAY_DATA.map(p => p.lang))].sort().forEach(lang => {
      const color = getLangColor(lang);
      const active = selectedLang === lang ? ' active' : '';
      html += `<button class="filter-btn lang-filter${active}" onclick="setLangFilter('${lang}')">
        <span class="lang-dot-sm" style="background:${color}"></span>${lang}
      </button>`;
    });
  } else {
    Object.keys(DOMAINS).forEach(domain => {
      const active = selectedDomain === domain ? ' active' : '';
      html += `<button class="filter-btn${active}" onclick="setDomainFilter('${domain}')">${domain}</button>`;
    });
  }

  row.innerHTML = html;
  renderActiveChips();
}

function renderActiveChips() {
  const el = document.getElementById('activeFilters');
  const chips = [];
  if (selectedLang) {
    chips.push(`<span class="filter-chip lang">
      <span class="lang-dot-sm" style="background:${getLangColor(selectedLang)}"></span>${selectedLang}
      <span class="filter-chip-remove" onclick="setLangFilter(null)">×</span>
    </span>`);
  }
  if (selectedDomain) {
    chips.push(`<span class="filter-chip">
      ${selectedDomain}
      <span class="filter-chip-remove" onclick="setDomainFilter(null)">×</span>
    </span>`);
  }
  el.innerHTML = chips.length ? `<span class="active-filters-label">已选：</span>${chips.join('')}` : '';
}

function setFilterMode(mode) {
  filterMode = mode;
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && mode === 'lang') || (i === 1 && mode === 'domain'));
  });
  renderFilters();
  renderTodayTop();
  renderTodayGrid();
}

function setLangFilter(lang) {
  selectedLang = lang || null;
  renderFilters();
  renderTodayTop();
  renderTodayGrid();
}

function setDomainFilter(domain) {
  selectedDomain = domain || null;
  renderFilters();
  renderTodayTop();
  renderTodayGrid();
}

function clearFilters() {
  selectedLang = null;
  selectedDomain = null;
  renderFilters();
  renderTodayTop();
  renderTodayGrid();
}

function renderTodayStats() {
  const total = TODAY_DATA.length;
  const todayTotal = TODAY_DATA.reduce((s, p) => s + p.starsToday, 0);
  const langs = new Set(TODAY_DATA.map(p => p.lang).filter(Boolean));
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><div class="stat-dot" style="background:var(--accent)"></div>共 <span class="num">${total}</span> 个项目</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--gold)"></div>今日新增 <span class="num">${formatNum(todayTotal)}</span> Stars</div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--blue)"></div>覆盖 <span class="num">${langs.size}</span> 种语言</div>

}

function renderTodayTop() {
  const data = getFilteredTodayData();
  const top = data[0];
  const el = document.getElementById('todayTopCard');
  document.getElementById('todayTopCount').textContent = `${data.length} 个项目`;

  if (!top) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">没有找到匹配的项目</div></div>';
    return;

  el.innerHTML = `

      <div class="top-rank">#${top.rank}</div>
      <div class="top-badge">🔥 今日最热</div>

        <span class="domain-tag">${top.domain}</span>
      </div>

function renderTodayGrid() {
  const data = getFilteredTodayData().slice(1);

function renderActiveChipsAlltime() {
  const el = document.getElementById('activeFiltersAlltime');
  const chips = [];
  if (selectedLangAlltime) {
    chips.push(`<span class="filter-chip lang">
      <span class="lang-dot-sm" style="background:${getLangColor(selectedLangAlltime)}"></span>${selectedLangAlltime}
      <span class="filter-chip-remove" onclick="setLangFilterAlltime(null)">×</span>
    </span>`);
  }
  if (selectedDomainAlltime) {
    chips.push(`<span class="filter-chip">
      ${selectedDomainAlltime}
      <span class="filter-chip-remove" onclick="setDomainFilterAlltime(null)">×</span>
    </span>`);

}

function setFilterModeAlltime(mode) {
  filterModeAlltime = mode;
  document.querySelectorAll('#tab-alltime .mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && mode === 'lang') || (i === 1 && mode === 'domain'));
  });
  renderFiltersAlltime();
  renderAlltime();
}

function setLangFilterAlltime(lang) {
  selectedLangAlltime = lang || null;
  renderFiltersAlltime();
  renderAlltime();
}

function setDomainFilterAlltime(domain) {
  selectedDomainAlltime = domain || null;
  renderFiltersAlltime();
  renderAlltime();
}

function clearFiltersAlltime() {
  selectedLangAlltime = null;
  selectedDomainAlltime = null;
  renderFiltersAlltime();
  renderAlltime();
}

function renderAlltime() {
  const data = getFilteredAlltimeData();
  const el = document.getElementById('alltimeGrid');
  document.getElementById('alltimeCount').textContent = `${data.length} 个项目`;
  if (!data.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">没有找到匹配的项目</div></div>';
    return;
  }
  el.innerHTML = data.map(p => buildAlltimeCard(p)).join('');
}

// ─── Search ───
let searchMode = 'local'; // 'local' or 'github'
let githubSearchTimeout = null;

function setSearchMode(mode) {
  searchMode = mode;
  document.getElementById('modeLocal').classList.toggle('active', mode === 'local');
  document.getElementById('modeGitHub').classList.toggle('active', mode === 'github');

  // If switching to local mode, clear github overlay
  if (mode === 'local') {
    closeGitHubSearch();
  }

  // Trigger search with current query
  const query = document.getElementById('search').value.trim();
  if (query) {
    handleSearch(query);
  }
}

function handleSearch(query) {
  if (searchMode === 'github') {
    // GitHub搜索模式：显示模态框并调用API
    openGitHubSearch(query);
  } else {
    // 本地搜索模式：使用现有搜索逻辑
    searchQuery = query;
    renderTodayTop();
    renderTodayGrid();
    renderWeekly();
    renderAlltime();
  }
}

function openGitHubSearch(query) {
  const overlay = document.getElementById('githubSearchOverlay');
  const body = document.getElementById('githubSearchBody');
  const querySpan = document.getElementById('githubSearchQuery');

  overlay.classList.add('active');
  querySpan.textContent = `"${query}"`;

  // 显示加载状态
  body.innerHTML = `
    <div class="github-search-loading">
      <div class="github-search-spinner"></div>
      <div>正在搜索 GitHub...</div>
    </div>
  `;

  // 调用 GitHub Search API
  searchGitHub(query);
}

function closeGitHubSearch(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('githubSearchOverlay').classList.remove('active');
}

async function searchGitHub(query) {
  const body = document.getElementById('githubSearchBody');
  const stats = document.getElementById('githubSearchStats');

  try {
    // GitHub Search API - 搜索仓库
    // 使用 Token 增加 API 限制 (搜索: 30次/分钟, 核心: 5000次/小时)
    const encodedQuery = encodeURIComponent(query);
    const apiUrl = `https://api.github.com/search/repositories?q=${encodedQuery}&sort=stars&order=desc&per_page=20`;

    // 调用 GitHub API
    const response = await fetch(apiUrl, {
      headers: {
        'Accept': 'application/vnd.github.v3+json',
        
        'User-Agent': 'GitHub-Trending-Viewer'
      }
    });

    if (!response.ok) {
      throw new Error(`API 返回错误: ${response.status}`);
    }

    const data = await response.json();

    if (data.total_count === 0) {
      body.innerHTML = `
        <div class="github-search-empty">
          <div style="font-size:32px;margin-bottom:12px">🔍</div>
          <div>未找到相关项目</div>
          <div style="margin-top:8px;font-size:12px">尝试使用不同的关键词</div>
        </div>
      `;
      stats.textContent = '0 个结果';
      return;
    }

    stats.textContent = `${data.total_count.toLocaleString()} 个结果，显示前 ${data.items.length} 个`;

    body.innerHTML = data.items.map(repo => `
      <a class="github-search-result" href="${repo.html_url}" target="_blank" rel="noopener">
        <div class="github-result-avatar">
          <img src="${repo.owner.avatar_url}&size=80" alt="${repo.owner.login}" loading="lazy">
        </div>
        <div class="github-result-content">
          <div class="github-result-name">${repo.owner.login} / ${repo.name}</div>
          <div class="github-result-desc">${repo.description || '暂无描述'}</div>
          <div class="github-result-meta">
            ${repo.language ? `
              <div class="github-result-lang">
                <div class="github-result-lang-dot" style="background:${getLangColor(repo.language)}"></div>
                ${repo.language}
              </div>
            ` : ''}
            <div>⭐ ${formatNum(repo.stargazers_count)}</div>
            <div>🍴 ${formatNum(repo.forks_count)}</div>
          </div>
        </div>
      </a>
    `).join('');

  } catch (error) {
    console.error('GitHub搜索失败:', error);
    body.innerHTML = `
      <div class="github-search-empty">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div>搜索失败</div>
        <div style="margin-top:8px;font-size:12px">${error.message}</div>
        <div style="margin-top:12px;font-size:11px;color:var(--text-dim)">
          可能原因：API请求次数限制、网络问题或CORS限制
        </div>
      </div>
    `;
    stats.textContent = '';
  }
}

document.getElementById('search').addEventListener('input', function () {
  const query = this.value.trim();

  // 清除之前的延迟搜索
  if (githubSearchTimeout) {
    clearTimeout(githubSearchTimeout);
  }

  if (!query) {
    // 空搜索词：关闭GitHub搜索模态框，恢复本地搜索
    if (searchMode === 'github') {
      closeGitHubSearch();
    }
    searchQuery = '';
    renderTodayTop();
    renderTodayGrid();
    renderWeekly();
    renderAlltime();
    return;
  }

  if (searchMode === 'github') {
    // GitHub搜索模式：延迟搜索以减少API调用
    githubSearchTimeout = setTimeout(() => {
      handleSearch(query);
    }, 500);
  } else {
    // 本地搜索模式：立即搜索
    handleSearch(query);
  }
});

// 回车键直接触发GitHub搜索
document.getElementById('search').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && searchMode === 'github') {
    e.preventDefault();
    if (githubSearchTimeout) {
      clearTimeout(githubSearchTimeout);
    }
    handleSearch(this.value.trim());
  }
});

// ─── Init ───
document.getElementById('updateTime').textContent = formatDate();
renderFilters();
renderFiltersWeekly();
renderFiltersAlltime();
renderTodayStats();
renderTodayTop();
renderTodayGrid();
renderWeekly();
renderAlltime();
</script>
